# team-rules/context-trim.conf — Schwellen für den context-trim PostToolUse-Hook (Daten vor Code).
#
# Der Hook hooks/context-trim.sh sourct DIESE Datei (Projekt-Override > Engine) und reicht die
# Werte an hooks/context-trim.py weiter. KEY=value, '#'-Kommentare + Leerzeilen ignoriert.
# Fehlt ein Wert, greift der eingebaute Default im Python (Wert in Klammern unten).
#
# Zweck: übergroße Tool-Outputs (Bash-stdout, Read-content, große MCP-JSON) VOR dem Kontext kürzen
# (Kopf+Schwanz+Pointer) und den Volltext stashen → der Bob holt Details on-demand (Read/grep).
# Struktur-erhaltend: nur das größte Text-Feld wird gekürzt, alle anderen Felder bleiben.

# Ab wieviel Bytes im größten Text-Feld wird gekürzt (Default 8000). Konservativ: nur echte Brocken.
CT_THRESHOLD_BYTES=8000

# Wieviele Zeilen Kopf bzw. Schwanz bleiben erhalten (Default 120 / 40).
CT_HEAD_LINES=120
CT_TAIL_LINES=40

# Stash-Verzeichnis für die Volltexte (Default: ${TMPDIR:-/tmp}/bobnet-context-trim).
# Ephemer halten (NICHT in ein Repo legen). Auskommentiert = Default.
# CT_STASH_DIR=
